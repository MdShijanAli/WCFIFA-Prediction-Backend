[build]
builder = "nixpacks"
buildCommand = "npm install --prefix backend && npm install --prefix frontend && npm run build:frontend && npm run build:backend && cd backend && npx prisma generate"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && npx ts-node prisma/seed.ts 2>/dev/null || true && node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
